<svg xmlns="http://www.w3.org/2000/svg" width="144" height="144" viewBox="0 0 144 144">
    <rect width="144" height="144" rx="16" fill="#f0f0f4"/>
    <clipPath id="rounded"><rect width="144" height="144" rx="16"/></clipPath>
    <!-- 5H col -->
    <rect x="0" y="84" width="48" height="60" fill="#22c55e" opacity="0.35" clip-path="url(#rounded)"/>
    <!-- 7D col -->
    <rect x="48" y="32" width="48" height="112" fill="#3b82f6" opacity="0.35" clip-path="url(#rounded)"/>
    <line x1="48" y1="0" x2="48" y2="144" stroke="#d4d4d8" stroke-width="1"/>
    <!-- SON col -->
    <rect x="96" y="94" width="48" height="50" fill="#22c55e" opacity="0.35" clip-path="url(#rounded)"/>
    <line x1="96" y1="0" x2="96" y2="144" stroke="#d4d4d8" stroke-width="1"/>

    <text x="24" y="24" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="13" font-weight="700">5H</text>
    <text x="72" y="24" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="13" font-weight="700">7D</text>
    <text x="120" y="24" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="13" font-weight="700">SON</text>

    <text x="24" y="86" text-anchor="middle" fill="#1a1a1a" font-family="Arial, sans-serif" font-size="20" font-weight="bold">42%</text>
    <text x="72" y="86" text-anchor="middle" fill="#1a1a1a" font-family="Arial, sans-serif" font-size="20" font-weight="bold">78%</text>
    <text x="120" y="86" text-anchor="middle" fill="#1a1a1a" font-family="Arial, sans-serif" font-size="20" font-weight="bold">35%</text>
  </svg>
