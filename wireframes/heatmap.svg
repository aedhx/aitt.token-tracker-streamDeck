<svg xmlns="http://www.w3.org/2000/svg" width="144" height="144" viewBox="0 0 144 144">
    <rect width="144" height="144" rx="16" fill="#0f0f1e"/>

    <text x="72" y="24" text-anchor="middle" fill="white" font-family="Arial, sans-serif"
      font-size="14" font-weight="bold">WEEKLY</text>

    <!-- Day labels -->
    <text x="16" y="48" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="10" font-weight="600">S</text>
    <text x="34" y="48" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="10" font-weight="600">M</text>
    <text x="52" y="48" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="10" font-weight="600">T</text>
    <text x="72" y="48" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="10" font-weight="600">W</text>
    <text x="92" y="48" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="10" font-weight="600">T</text>
    <text x="110" y="48" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="10" font-weight="600">F</text>
    <text x="128" y="48" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="10" font-weight="600">S</text>

    <!-- Heatmap squares -->
    <rect x="8" y="54" width="16" height="16" rx="3" fill="#22c55e" opacity="0.3"/>
    <rect x="26" y="54" width="16" height="16" rx="3" fill="#22c55e" opacity="0.7"/>
    <rect x="44" y="54" width="16" height="16" rx="3" fill="#3b82f6" opacity="0.8"/>
    <rect x="64" y="54" width="16" height="16" rx="3" fill="#3b82f6"/>
    <rect x="84" y="54" width="16" height="16" rx="3" fill="#ef4444" opacity="0.8"/>
    <rect x="102" y="54" width="16" height="16" rx="3" fill="#3b82f6" opacity="0.6"/>
    <rect x="120" y="54" width="16" height="16" rx="3" fill="#22c55e" opacity="0.4"/>

    <!-- Legend -->
    <rect x="14" y="96" width="10" height="10" rx="2" fill="#22c55e" opacity="0.4"/>
    <text x="28" y="105" text-anchor="start" fill="#888" font-family="Arial, sans-serif" font-size="10">Low</text>

    <rect x="56" y="96" width="10" height="10" rx="2" fill="#3b82f6"/>
    <text x="70" y="105" text-anchor="start" fill="#888" font-family="Arial, sans-serif" font-size="10">Mid</text>

    <rect x="96" y="96" width="10" height="10" rx="2" fill="#ef4444"/>
    <text x="110" y="105" text-anchor="start" fill="#888" font-family="Arial, sans-serif" font-size="10">High</text>
  </svg>
